services:
  api:
    build:
      context: .
      target: development
    container_name: testers-admin-api
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: ${PORT:-8080}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_SSLMODE: ${DB_SSLMODE:-require}
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/tmp
        # Mount SSL certificates (read-only)
      - ./certs/root.crt:/app/certs/root.crt:ro
    networks:
      - testers-admin-network
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: postgres17-testers
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/certs/server.crt"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/certs/server.key"
      - "-c"
      - "ssl_ca_file=/var/lib/postgresql/certs/root.crt"
      - "-c"
      - "ssl_prefer_server_ciphers=on"
      - "-c"
      - "ssl_min_protocol_version=TLSv1.2"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
        # Require SSL for all connections
      POSTGRES_HOST_SSL: "on"
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Mount SSL certificates
      - ./certs/server.crt:/var/lib/postgresql/certs/server.crt:ro
      - ./certs/server.key:/var/lib/postgresql/certs/server.key:ro
      - ./certs/root.crt:/var/lib/postgresql/certs/root.crt:ro
      # Mount pg_hba.conf to enforce SSL-only connections
      - ./db/config/pg_hba.conf:/var/lib/postgresql/data/pg_hba.conf:ro
    networks:
      - testers-admin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
    name: testers_admin_db_data

networks:
  testers-admin-network:
    name: testers-admin-network
    driver: bridge