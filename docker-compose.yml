services:
  api:
    build:
      context: .
      target: development
    container_name: testers-admin-api
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: ${PORT:-8080}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      WEB_BASE_URL: ${WEB_BASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ANDROID_INVITE_LINK: ${ANDROID_INVITE_LINK}
      IOS_INVITE_LINK: ${IOS_INVITE_LINK}
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/tmp
    networks:
      - testers-admin-network
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: postgres17-testers
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - testers-admin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
    name: testers_admin_db_data

networks:
  testers-admin-network:
    name: testers-admin-network
    driver: bridge